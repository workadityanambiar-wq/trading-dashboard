name: Deploy Backend to Railway

on:
  push:
    branches: [master]
    paths:
      - "backend/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Write Railway auth config
        env:
          RAILWAY_CONFIG_JSON: ${{ secrets.RAILWAY_CONFIG }}
        run: |
          mkdir -p ~/.railway
          python3 -c "import os; open(os.path.expanduser('~/.railway/config.json'), 'w').write(os.environ['RAILWAY_CONFIG_JSON'])"
          echo "Config written: $(wc -c < ~/.railway/config.json) bytes"
          railway whoami || true

      - name: Deploy to Railway
        working-directory: backend
        run: railway up --service 5f99efb6-891c-49b2-82d4-ab67c842412a --environment 509eba38-12c7-4588-b2ac-39cb681c9491 --detach

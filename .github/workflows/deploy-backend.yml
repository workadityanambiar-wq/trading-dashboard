name: Deploy Backend to Railway

on:
  push:
    branches: [master]
    paths:
      - "backend/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Debug Railway CLI
        run: |
          railway --version
          railway login --help 2>&1 || true
          ls -la ~/.railway/ 2>/dev/null || echo "~/.railway not found"
          ls -la ~/.config/railway/ 2>/dev/null || echo "~/.config/railway not found"

      - name: Write Railway auth config
        env:
          RAILWAY_CONFIG_JSON: ${{ secrets.RAILWAY_CONFIG }}
        run: |
          mkdir -p ~/.railway
          python3 -c "import os; open(os.path.expanduser('~/.railway/config.json'), 'w').write(os.environ['RAILWAY_CONFIG_JSON'])"
          cat ~/.railway/config.json
          railway whoami 2>&1 || true

      - name: Deploy to Railway
        working-directory: backend
        run: railway up --service 5f99efb6-891c-49b2-82d4-ab67c842412a --environment 509eba38-12c7-4588-b2ac-39cb681c9491 --detach

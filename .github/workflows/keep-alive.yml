name: Keep Backend Alive

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render backend
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" https://trading-dashboard-backend.onrender.com/docs)
          echo "Backend responded with HTTP $status"
          if [ "$status" -lt 200 ] || [ "$status" -ge 500 ]; then
            echo "Backend unhealthy!"
            exit 1
          fi
